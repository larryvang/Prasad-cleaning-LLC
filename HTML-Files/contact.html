<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Prasad's Cleaning LLC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Prasad's Cleaning Services LLC">
        <img class="logo-img" src="assets/logo.png" alt="Prasad's Cleaning Services LLC" />
      </a>
      <nav class="nav" aria-label="Main">
        <ul class="nav-list">
          <li><a href="services.html">Services</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="testimonials.html">Reviews</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
      <a href="contact.html" class="btn btn-primary">Get a Quote</a>
    </div>
  </header>

  <main>
    <section class="section cta">
      <div class="container cta-inner">
        <h1 class="section-title">Contact</h1>
        <p class="cta-text">Send us a message and we’ll get back to you shortly.</p>

        <form class="contact-form" action="#" method="post">
          <input type="text" name="name" placeholder="Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="tel" name="phone" placeholder="Phone" />
          <textarea name="message" placeholder="How can we help?" rows="4"></textarea>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">Prasad's Cleaning LLC</div>
      <div class="footer-links">
        <a href="services.html">Services</a> · <a href="about.html">About</a> · <a href="testimonials.html">Reviews</a> · <a href="contact.html">Contact</a>
      </div>
      <div class="footer-contact">Phone · Email</div>
    </div>
    <div class="footer-bottom">© Prasad's Cleaning LLC. All rights reserved.</div>
  </footer>
</body>
</html>
