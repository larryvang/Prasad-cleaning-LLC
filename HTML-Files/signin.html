<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Prasad's Cleaning LLC</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-inner">

    <a href="index.html" class="logo">
      <img class="logo-img" src="assets/logo.png" alt="Prasad's Cleaning Services LLC">
    </a>

    <nav class="nav">
      <ul class="nav-list">
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="testimonials.html">Reviews</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <a href="contact.html" class="btn btn-primary">Get a Quote</a>
      <a href="signin.html" class="btn btn-primary">Sign In</a>
    </div>

  </div>
</header>


<!-- SIGN IN SECTION -->
<section class="section signin">
  <div class="container signin-container">

    <h1 class="section-title">Sign In</h1>
    <p class="section-subtitle">
      Access your account to manage bookings and services.
    </p>

    <form class="signin-form">

      <input
        type="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        placeholder="Password"
        required
      >

      <button type="submit" class="btn btn-primary btn-lg">
        Sign In
      </button>

      <p class="signin-footer">
        Don't have an account?
        <a href="#">Create one</a>
      </p>

    </form>

  </div>
</section>


<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-inner">
    <div>Prasad's Cleaning LLC</div>
    <div>
      <a href="services.html">Services</a> ·
      <a href="about.html">About</a> ·
      <a href="contact.html">Contact</a>
    </div>
    <div>Phone · Email</div>
  </div>

  <div class="footer-bottom">
    © Prasad's Cleaning LLC. All rights reserved.
  </div>
</footer>

</body>
</html>
